<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DPL Cricket Dashboard</title>
  <style>
    :root {
      --primary: #1a472a;
      --secondary: #2d6a4f;
      --accent: #f4a261;
      --gold: #ffd700;
      --light: #f0f7f4;
      --white: #ffffff;
      --dark: #1b1b2f;
      --text: #2c3e50;
      --success: #27ae60;
      --card-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #0a1f10 0%, #1a472a 60%, #0a1f10 100%);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #071810, #1a472a, #071810);
      padding: 36px 20px 28px;
      text-align: center;
      border-bottom: 3px solid var(--gold);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,215,0,0.07) 0%, transparent 70%);
      animation: headerPulse 5s ease-in-out infinite;
    }
    @keyframes headerPulse {
      0%,100% { opacity: 0.6; } 50% { opacity: 1; }
    }
    .header h1 {
      font-size: clamp(1.8em, 5vw, 2.8em);
      color: var(--gold);
      text-shadow: 0 0 30px rgba(255,215,0,0.6);
      letter-spacing: 4px;
      position: relative;
    }
    .header h2 {
      color: rgba(255,255,255,0.7);
      font-size: clamp(0.75em, 2vw, 1em);
      margin-top: 8px;
      letter-spacing: 6px;
      text-transform: uppercase;
      position: relative;
    }

    /* ── CONTAINER ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px 20px;
      margin-bottom: 24px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 120px;
    }
    .stat-icon { font-size: 1.4em; }
    .stat-info { display: flex; flex-direction: column; }
    .stat-label { font-size: 0.72em; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 1.15em; font-weight: 800; color: var(--gold); }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 18px;
      padding: 24px 26px;
      margin-bottom: 22px;
      box-shadow: var(--card-shadow);
    }
    .card-title {
      font-size: 1.15em;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 9px;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--accent);
      margin-bottom: 20px;
    }
    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--accent);
      margin-bottom: 20px;
    }
    .card-title-inline {
      font-size: 1.15em;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 9px;
    }

    /* ── FORM ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 2fr auto;
      gap: 14px;
      align-items: end;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label {
      font-size: 0.78em;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input {
      padding: 11px 15px;
      border: 2px solid #e4e4e4;
      border-radius: 10px;
      font-size: 0.95em;
      transition: border-color 0.25s, box-shadow 0.25s;
      outline: none;
      color: var(--text);
    }
    .input:focus { border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(45,106,79,0.1); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 22px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9em;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn-green {
      background: linear-gradient(135deg, #1a472a, #2d6a4f);
      color: white;
      box-shadow: 0 4px 14px rgba(26,71,42,0.3);
    }
    .btn-green:hover { box-shadow: 0 6px 20px rgba(26,71,42,0.45); }
    .btn-orange {
      background: linear-gradient(135deg, #f4a261, #e76f51);
      color: white;
      box-shadow: 0 4px 14px rgba(244,162,97,0.3);
    }
    .btn-orange:hover { box-shadow: 0 6px 20px rgba(244,162,97,0.45); }
    .btn-gold {
      background: linear-gradient(135deg, #f0b429, #ffd700);
      color: #1a1a1a;
      box-shadow: 0 4px 14px rgba(255,215,0,0.3);
    }
    .btn-gold:hover { box-shadow: 0 6px 20px rgba(255,215,0,0.5); }
    .btn-sm { padding: 7px 14px; font-size: 0.8em; border-radius: 8px; }

    /* ── TEAMS GRID ── */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .team-card {
      background: linear-gradient(135deg, #f6fdf9, #e8f5e9);
      border: 2px solid #c8e6c9;
      border-radius: 14px;
      padding: 16px;
      transition: transform 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.35s ease;
    }
    .team-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(26,71,42,0.13); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .team-card-top {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 12px;
    }
    .team-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4em;
      flex-shrink: 0;
    }
    .team-card-name { font-weight: 800; font-size: 1em; color: var(--primary); }
    .team-card-sub  { font-size: 0.75em; color: #888; margin-top: 2px; }
    .player-chips   { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      background: var(--primary);
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.76em;
      font-weight: 500;
    }

    /* ── FIXTURE ROW ── */
    .fixture-row {
      display: grid;
      grid-template-columns: 44px 1fr 52px 1fr 160px 170px 90px;
      gap: 10px;
      align-items: center;
      background: #f8f9fa;
      border-radius: 12px;
      padding: 13px 16px;
      margin-bottom: 10px;
      border-left: 4px solid #ddd;
      animation: fadeUp 0.35s ease;
    }
    .fixture-row.done { border-left-color: var(--success); background: #f0fff4; }
    .match-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.82em;
      flex-shrink: 0;
    }
    .team-label { font-weight: 600; font-size: 0.93em; color: var(--text); }
    .team-label.right { text-align: right; }
    .vs-badge {
      background: linear-gradient(135deg, var(--accent), #e76f51);
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.78em;
      font-weight: 800;
      text-align: center;
    }
    .winner-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.82em;
    }
    .inline-select {
      padding: 8px 10px;
      border: 2px solid #ddd;
      border-radius: 9px;
      background: white;
      font-size: 0.85em;
      cursor: pointer;
      width: 100%;
      color: var(--text);
    }
    .inline-input {
      padding: 8px 10px;
      border: 2px solid #ddd;
      border-radius: 9px;
      font-size: 0.85em;
      width: 100%;
      text-align: center;
      color: var(--text);
    }
    .inline-input:focus, .inline-select:focus { border-color: var(--secondary); outline: none; }

    /* ── POINTS TABLE ── */
    .pt-table { width: 100%; border-collapse: collapse; border-radius: 12px; overflow: hidden; }
    .pt-table thead tr { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .pt-table th { padding: 13px 14px; text-align: center; font-size: 0.82em; text-transform: uppercase; letter-spacing: 0.8px; }
    .pt-table td { padding: 11px 14px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.9em; }
    .pt-table tbody tr:hover { background: #f0f7f4; }
    .pt-table tbody tr:first-child td { background: #fffde7; }
    .rank-badge {
      width: 28px; height: 28px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.85em;
    }
    .r1 { background: var(--gold); color: #333; }
    .r2 { background: #c0c0c0; color: #333; }
    .r3 { background: #cd7f32; color: white; }
    .rn { background: #eee; color: #777; }
    .q-badge { background: #27ae60; color: white; padding: 2px 7px; border-radius: 4px; font-size: 0.72em; font-weight: 700; margin-left: 5px; }

    /* ── KNOCKOUT CARD ── */
    .ko-card {
      background: linear-gradient(160deg, #071810, #1a472a);
      border-radius: 18px;
      padding: 24px 26px;
      margin-bottom: 22px;
      border: 1px solid rgba(255,215,0,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .ko-title {
      font-size: 1.15em;
      font-weight: 700;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 9px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(255,215,0,0.3);
      margin-bottom: 20px;
    }
    .ko-fixture {
      display: grid;
      grid-template-columns: 130px 1fr 52px 1fr 160px 170px 90px;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 13px 16px;
      margin-bottom: 12px;
    }
    .ko-fixture.done { border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.06); }
    .ko-label {
      background: var(--gold);
      color: #1a1a1a;
      padding: 5px 10px;
      border-radius: 7px;
      font-size: 0.78em;
      font-weight: 800;
      text-align: center;
    }
    .ko-team { font-weight: 600; font-size: 0.93em; color: rgba(255,255,255,0.9); }
    .ko-team.right { text-align: right; }
    .ko-input {
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 9px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 0.85em;
      width: 100%;
      text-align: center;
    }
    .ko-select {
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 9px;
      background: rgba(30,60,40,0.9);
      color: white;
      font-size: 0.85em;
      cursor: pointer;
      width: 100%;
    }
    .ko-select option { background: #1a3a28; }
    .ko-input:focus, .ko-select:focus { outline: none; border-color: var(--gold); }

    /* ── CHAMPION ── */
    .champion-wrap {
      margin-bottom: 24px;
      border-radius: 18px;
      overflow: hidden;
    }
    .champion-banner {
      background: linear-gradient(135deg, #b8860b, var(--gold), #f0d060, var(--gold), #b8860b);
      background-size: 300% 100%;
      animation: shimmer 3s linear infinite, glowPulse 2s ease-in-out infinite;
      padding: 36px 24px;
      text-align: center;
    }
    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 30px rgba(255,215,0,0.4); }
      50%      { box-shadow: 0 0 70px rgba(255,215,0,0.9); }
    }
    .champion-trophy { font-size: 4em; display: block; margin-bottom: 8px; }
    .champion-name { font-size: clamp(1.5em, 4vw, 2.4em); font-weight: 900; color: #1a1a1a; letter-spacing: 2px; }
    .champion-sub  { font-size: 0.85em; color: #333; margin-top: 8px; letter-spacing: 4px; text-transform: uppercase; font-weight: 600; }

    /* ── EMPTY STATE ── */
    .empty { color: #bbb; font-style: italic; font-size: 0.9em; padding: 10px 0; }

    /* ── UTIL ── */
    .hidden { display: none !important; }
    .mt10 { margin-top: 10px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 820px) {
      .form-row { grid-template-columns: 1fr; }
      .fixture-row {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .fixture-row .match-num { grid-row: 1; grid-column: 1; }
      .ko-fixture { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<div class="header">
  <h1>🏏 DPL Cricket Dashboard</h1>
  <h2>Downtown Premier League</h2>
</div>

<div class="container">

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-icon">🏆</span>
      <div class="stat-info">
        <span class="stat-label">Teams</span>
        <span class="stat-value" id="statTeams">0</span>
      </div>
    </div>
    <div class="stat-item">
      <span class="stat-icon">🏟️</span>
      <div class="stat-info">
        <span class="stat-label">Matches</span>
        <span class="stat-value" id="statMatches">0</span>
      </div>
    </div>
    <div class="stat-item">
      <span class="stat-icon">✅</span>
      <div class="stat-info">
        <span class="stat-label">Done</span>
        <span class="stat-value" id="statDone">0</span>
      </div>
    </div>
    <div class="stat-item">
      <span class="stat-icon">📊</span>
      <div class="stat-info">
        <span class="stat-label">Stage</span>
        <span class="stat-value" id="statStage">Setup</span>
      </div>
    </div>
  </div>

  <!-- ADD TEAM -->
  <div class="card" id="addTeamCard">
    <div class="card-title">🏏 Add Team</div>
    <div class="form-row">
      <div class="form-group">
        <label>Team Name</label>
        <input class="input" id="teamName" placeholder="e.g. Mumbai Stars" onkeydown="if(event.key==='Enter') addTeam()">
      </div>
      <div class="form-group">
        <label>Players (comma separated)</label>
        <input class="input" id="players" placeholder="e.g. Rohit, Virat, Dhoni, KL Rahul" onkeydown="if(event.key==='Enter') addTeam()">
      </div>
      <button class="btn btn-green" onclick="addTeam()">+ Add Team</button>
    </div>
  </div>

  <!-- TEAMS DISPLAY -->
  <div class="card">
    <div class="card-header-row">
      <div class="card-title-inline">🛡️ Teams &nbsp;<span id="teamCount" style="color:var(--accent);">0</span></div>
      <button class="btn btn-gold hidden" id="genBtn" onclick="generateFixtures()">⚡ Generate Fixtures</button>
    </div>
    <div class="teams-grid" id="teamsGrid">
      <p class="empty">No teams added yet. Add at least 2 teams to generate fixtures.</p>
    </div>
  </div>

  <!-- GROUP STAGE FIXTURES -->
  <div class="card hidden" id="fixturesCard">
    <div class="card-title">📅 Group Stage — All Fixtures</div>
    <div id="fixturesList"></div>
  </div>

  <!-- POINTS TABLE -->
  <div class="card hidden" id="pointsCard">
    <div class="card-title">📊 Points Table</div>
    <table class="pt-table">
      <thead>
        <tr>
          <th>#</th><th style="text-align:left;">Team</th>
          <th>P</th><th>W</th><th>L</th>
          <th>Pts</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="ptBody"></tbody>
    </table>
  </div>

  <!-- SEMI FINALS -->
  <div class="ko-card hidden" id="sfCard">
    <div class="ko-title">⚡ Semi Finals</div>
    <div id="sfList"></div>
  </div>

  <!-- FINAL -->
  <div class="ko-card hidden" id="finalCard">
    <div class="ko-title">🏆 Final</div>
    <div id="finalDiv"></div>
  </div>

  <!-- CHAMPION -->
  <div class="champion-wrap hidden" id="champWrap">
    <div class="champion-banner">
      <span class="champion-trophy">🏆</span>
      <div class="champion-name" id="champName">—</div>
      <div class="champion-sub">🎉 DPL Champions 2026 🎉</div>
    </div>
  </div>

</div><!-- /container -->

<script>
// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let state = {
  teams: [],            // [{name, players:[]}]
  fixtures: [],         // [{id,team1,team2,score,winner,status}]
  semis: [],            // [{id,label,team1,team2,score,winner,status}]
  finalMatch: null,     // {label,team1,team2,score,winner,status}
  phase: 'setup',       // setup | group | semis | final | done
  fixturesGenerated: false,
  semisGenerated: false,
  finalGenerated: false,
};

const AVATAR_BG = [
  'background:linear-gradient(135deg,#1a472a,#2d6a4f)',
  'background:linear-gradient(135deg,#1a3a6a,#2d5a9f)',
  'background:linear-gradient(135deg,#6a1a1a,#9f2d2d)',
  'background:linear-gradient(135deg,#5a3a1a,#9f6e2d)',
  'background:linear-gradient(135deg,#3a1a6a,#6a2d9f)',
  'background:linear-gradient(135deg,#1a5a6a,#2d8a9f)',
  'background:linear-gradient(135deg,#5a6a1a,#8a9f2d)',
  'background:linear-gradient(135deg,#6a1a5a,#9f2d8a)',
];
const INITIALS = t => t.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

// ══════════════════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════════════════
function save() {
  try { localStorage.setItem('dpl_state', JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const raw = localStorage.getItem('dpl_state');
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
}

// ══════════════════════════════════════════════════════
//  ADD TEAM
// ══════════════════════════════════════════════════════
function addTeam() {
  if (state.fixturesGenerated) { alert('Fixtures already generated — cannot add more teams.'); return; }
  const nameEl = document.getElementById('teamName');
  const playEl = document.getElementById('players');
  const name = nameEl.value.trim();
  const players = playEl.value.split(',').map(p=>p.trim()).filter(Boolean);

  if (!name) { alert('Please enter a team name.'); return; }
  if (state.teams.find(t => t.name.toLowerCase() === name.toLowerCase())) {
    alert('Team name already exists!'); return;
  }

  state.teams.push({ name, players });
  nameEl.value = '';
  playEl.value = '';
  save();
  renderTeams();
  updateStats();
}

// ══════════════════════════════════════════════════════
//  RENDER TEAMS
// ══════════════════════════════════════════════════════
function renderTeams() {
  const grid = document.getElementById('teamsGrid');
  const count = document.getElementById('teamCount');
  const btn   = document.getElementById('genBtn');

  count.textContent = state.teams.length;
  btn.classList.toggle('hidden', state.teams.length < 2 || state.fixturesGenerated);

  if (!state.teams.length) {
    grid.innerHTML = '<p class="empty">No teams added yet. Add at least 2 teams to generate fixtures.</p>';
    return;
  }

  grid.innerHTML = state.teams.map((t, i) => `
    <div class="team-card">
      <div class="team-card-top">
        <div class="team-avatar" style="${AVATAR_BG[i % AVATAR_BG.length]};color:white;font-weight:800;font-size:1em;">${INITIALS(t.name)}</div>
        <div>
          <div class="team-card-name">${esc(t.name)}</div>
          <div class="team-card-sub">${t.players.length} player${t.players.length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="player-chips">
        ${t.players.length
          ? t.players.map(p=>`<span class="chip">${esc(p)}</span>`).join('')
          : '<span style="color:#aaa;font-size:0.82em;">No players listed</span>'}
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════
//  GENERATE FIXTURES  (round-robin)
// ══════════════════════════════════════════════════════
function generateFixtures() {
  if (state.teams.length < 2) { alert('Add at least 2 teams!'); return; }
  state.fixturesGenerated = true;
  state.phase = 'group';

  let id = 1;
  state.fixtures = [];
  const t = state.teams;
  for (let i = 0; i < t.length; i++) {
    for (let j = i+1; j < t.length; j++) {
      state.fixtures.push({ id: id++, team1: t[i].name, team2: t[j].name, score:'', winner:'', status:'pending' });
    }
  }

  document.getElementById('genBtn').classList.add('hidden');
  const addCard = document.getElementById('addTeamCard');
  addCard.style.opacity = '0.5';
  addCard.style.pointerEvents = 'none';

  document.getElementById('fixturesCard').classList.remove('hidden');
  document.getElementById('pointsCard').classList.remove('hidden');

  save();
  renderFixtures();
  renderPoints();
  updateStats();
}

// ══════════════════════════════════════════════════════
//  RENDER GROUP FIXTURES
// ══════════════════════════════════════════════════════
function renderFixtures() {
  const list = document.getElementById('fixturesList');
  list.innerHTML = state.fixtures.map(f => {
    if (f.status === 'completed') {
      return `
        <div class="fixture-row done">
          <div class="match-num">${f.id}</div>
          <div class="team-label right">${esc(f.team1)}</div>
          <div class="vs-badge">VS</div>
          <div class="team-label">${esc(f.team2)}</div>
          <div style="text-align:center;font-size:0.85em;color:#555;">${esc(f.score)||'—'}</div>
          <div class="winner-chip">🏆 ${esc(f.winner)}</div>
          <div></div>
        </div>`;
    }
    return `
      <div class="fixture-row" id="fr-${f.id}">
        <div class="match-num">${f.id}</div>
        <div class="team-label right">${esc(f.team1)}</div>
        <div class="vs-badge">VS</div>
        <div class="team-label">${esc(f.team2)}</div>
        <input class="inline-input" id="sc-${f.id}" placeholder="Score" value="${esc(f.score)}">
        <select class="inline-select" id="wn-${f.id}">
          <option value="">Select Winner</option>
          <option value="${esc(f.team1)}">${esc(f.team1)}</option>
          <option value="${esc(f.team2)}">${esc(f.team2)}</option>
        </select>
        <button class="btn btn-green btn-sm" onclick="saveGroup(${f.id})">Save</button>
      </div>`;
  }).join('');
}

function saveGroup(id) {
  const score  = document.getElementById(`sc-${id}`)?.value.trim() || '';
  const winner = document.getElementById(`wn-${id}`)?.value || '';
  if (!winner) { alert('Please select a winner!'); return; }
  const f = state.fixtures.find(x=>x.id===id);
  f.score = score; f.winner = winner; f.status = 'completed';
  save();
  renderFixtures();
  renderPoints();
  checkGroupDone();
  updateStats();
}

// ══════════════════════════════════════════════════════
//  POINTS TABLE
// ══════════════════════════════════════════════════════
function standings() {
  return state.teams.map(t => {
    const played = state.fixtures.filter(f=>f.status==='completed'&&(f.team1===t.name||f.team2===t.name)).length;
    const won    = state.fixtures.filter(f=>f.status==='completed'&&f.winner===t.name).length;
    return { name:t.name, played, won, lost:played-won, pts:won*2 };
  }).sort((a,b) => b.pts - a.pts || b.won - a.won);
}

function renderPoints() {
  const rows = standings();
  const qCount = state.teams.length <= 3 ? 2 : 4;
  const rankCls = i => ['r1','r2','r3'][i] || 'rn';
  document.getElementById('ptBody').innerHTML = rows.map((r,i) => `
    <tr>
      <td><span class="rank-badge ${rankCls(i)}">${i+1}</span></td>
      <td style="text-align:left;font-weight:600;">${esc(r.name)}${i<qCount&&state.fixturesGenerated?'<span class="q-badge">Q</span>':''}</td>
      <td>${r.played}</td><td>${r.won}</td><td>${r.lost}</td>
      <td style="font-weight:800;color:var(--primary);">${r.pts}</td>
      <td>${i<qCount&&state.fixturesGenerated?'<span style="color:#27ae60;font-weight:600;">✅ Qualifying</span>':''}</td>
    </tr>`).join('');
}

// ══════════════════════════════════════════════════════
//  CHECK GROUP DONE → spawn knockouts
// ══════════════════════════════════════════════════════
function checkGroupDone() {
  if (state.semisGenerated) return;
  if (!state.fixtures.every(f=>f.status==='completed')) return;
  state.semisGenerated = true;
  state.phase = 'semis';
  spawnKnockouts();
  save();
}

function spawnKnockouts() {
  const top = standings();
  if (state.teams.length <= 3) {
    // Straight to final
    state.finalMatch = { label:'Final', team1:top[0].name, team2:top[1].name, score:'', winner:'', status:'pending' };
    state.phase = 'final';
    state.finalGenerated = true;
    document.getElementById('finalCard').classList.remove('hidden');
    renderFinal();
  } else {
    // 1st vs 4th, 2nd vs 3rd
    const t4 = top[3]?.name || top[top.length-1].name;
    state.semis = [
      { id:'SF1', label:'SF 1 · 1st vs 4th', team1:top[0].name, team2:t4,          score:'', winner:'', status:'pending' },
      { id:'SF2', label:'SF 2 · 2nd vs 3rd', team1:top[1].name, team2:top[2].name, score:'', winner:'', status:'pending' },
    ];
    document.getElementById('sfCard').classList.remove('hidden');
    renderSemis();
  }
  updateStats();
}

// ══════════════════════════════════════════════════════
//  SEMI FINALS
// ══════════════════════════════════════════════════════
function renderSemis() {
  const list = document.getElementById('sfList');
  list.innerHTML = state.semis.map(sf => {
    if (sf.status === 'completed') return `
      <div class="ko-fixture done">
        <div class="ko-label">${esc(sf.label)}</div>
        <div class="ko-team right">${esc(sf.team1)}</div>
        <div class="vs-badge">VS</div>
        <div class="ko-team">${esc(sf.team2)}</div>
        <div style="text-align:center;color:rgba(255,255,255,0.7);font-size:0.85em;">${esc(sf.score)||'—'}</div>
        <div class="winner-chip" style="background:linear-gradient(135deg,#f0b429,var(--gold));color:#1a1a1a;">🏆 ${esc(sf.winner)}</div>
        <div></div>
      </div>`;
    return `
      <div class="ko-fixture" id="sf-${sf.id}">
        <div class="ko-label">${esc(sf.label)}</div>
        <div class="ko-team right">${esc(sf.team1)}</div>
        <div class="vs-badge">VS</div>
        <div class="ko-team">${esc(sf.team2)}</div>
        <input class="ko-input" id="ssc-${sf.id}" placeholder="Score" value="${esc(sf.score)}">
        <select class="ko-select" id="swn-${sf.id}">
          <option value="">Select Winner</option>
          <option value="${esc(sf.team1)}">${esc(sf.team1)}</option>
          <option value="${esc(sf.team2)}">${esc(sf.team2)}</option>
        </select>
        <button class="btn btn-gold btn-sm" onclick="saveSemi('${sf.id}')">Save</button>
      </div>`;
  }).join('');
}

function saveSemi(id) {
  const score  = document.getElementById(`ssc-${id}`)?.value.trim() || '';
  const winner = document.getElementById(`swn-${id}`)?.value || '';
  if (!winner) { alert('Please select a winner!'); return; }
  const sf = state.semis.find(s=>s.id===id);
  sf.score = score; sf.winner = winner; sf.status = 'completed';
  renderSemis();
  if (state.semis.every(s=>s.status==='completed') && !state.finalGenerated) {
    state.finalGenerated = true;
    state.phase = 'final';
    state.finalMatch = {
      label: 'Final',
      team1: state.semis[0].winner,
      team2: state.semis[1].winner,
      score: '', winner: '', status: 'pending'
    };
    document.getElementById('finalCard').classList.remove('hidden');
    renderFinal();
  }
  save();
  updateStats();
}

// ══════════════════════════════════════════════════════
//  FINAL
// ══════════════════════════════════════════════════════
function renderFinal() {
  const div = document.getElementById('finalDiv');
  const fm  = state.finalMatch;
  if (!fm) return;
  if (fm.status === 'completed') {
    div.innerHTML = `
      <div class="ko-fixture done">
        <div class="ko-label" style="background:var(--gold);color:#1a1a1a;">🏆 FINAL</div>
        <div class="ko-team right">${esc(fm.team1)}</div>
        <div class="vs-badge">VS</div>
        <div class="ko-team">${esc(fm.team2)}</div>
        <div style="text-align:center;color:rgba(255,255,255,0.7);font-size:0.85em;">${esc(fm.score)||'—'}</div>
        <div class="winner-chip" style="background:linear-gradient(135deg,#f0b429,var(--gold));color:#1a1a1a;">🏆 ${esc(fm.winner)}</div>
        <div></div>
      </div>`;
    showChampion(fm.winner);
    return;
  }
  div.innerHTML = `
    <div class="ko-fixture" id="final-row">
      <div class="ko-label" style="background:var(--gold);color:#1a1a1a;">🏆 FINAL</div>
      <div class="ko-team right">${esc(fm.team1)}</div>
      <div class="vs-badge">VS</div>
      <div class="ko-team">${esc(fm.team2)}</div>
      <input class="ko-input" id="fsc" placeholder="Score" value="${esc(fm.score)}">
      <select class="ko-select" id="fwn">
        <option value="">Select Winner</option>
        <option value="${esc(fm.team1)}">${esc(fm.team1)}</option>
        <option value="${esc(fm.team2)}">${esc(fm.team2)}</option>
      </select>
      <button class="btn btn-gold btn-sm" onclick="saveFinal()">Save</button>
    </div>`;
}

function saveFinal() {
  const score  = document.getElementById('fsc')?.value.trim() || '';
  const winner = document.getElementById('fwn')?.value || '';
  if (!winner) { alert('Please select a winner!'); return; }
  state.finalMatch.score = score;
  state.finalMatch.winner = winner;
  state.finalMatch.status = 'completed';
  state.phase = 'done';
  save();
  renderFinal();
  updateStats();
}

// ══════════════════════════════════════════════════════
//  CHAMPION
// ══════════════════════════════════════════════════════
function showChampion(name) {
  document.getElementById('champName').textContent = name;
  document.getElementById('champWrap').classList.remove('hidden');
  setTimeout(() => document.getElementById('champWrap').scrollIntoView({ behavior:'smooth', block:'center' }), 300);
}

// ══════════════════════════════════════════════════════
//  STATS BAR
// ══════════════════════════════════════════════════════
function updateStats() {
  document.getElementById('statTeams').textContent   = state.teams.length;
  document.getElementById('statMatches').textContent = state.fixtures.length;
  document.getElementById('statDone').textContent    = state.fixtures.filter(f=>f.status==='completed').length;
  const stages = { setup:'Setup 🔧', group:'Group Stage 🏟️', semis:'Semi Finals ⚡', final:'Final 🏆', done:'Complete 🎉' };
  document.getElementById('statStage').textContent   = stages[state.phase] || state.phase;
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════
//  FULL RESTORE
// ══════════════════════════════════════════════════════
function restoreUI() {
  renderTeams();
  if (state.fixturesGenerated) {
    const addCard = document.getElementById('addTeamCard');
    addCard.style.opacity = '0.5';
    addCard.style.pointerEvents = 'none';
    document.getElementById('fixturesCard').classList.remove('hidden');
    document.getElementById('pointsCard').classList.remove('hidden');
    renderFixtures();
    renderPoints();
  }
  if (state.semisGenerated && state.semis.length) {
    document.getElementById('sfCard').classList.remove('hidden');
    renderSemis();
  }
  if (state.finalGenerated && state.finalMatch) {
    document.getElementById('finalCard').classList.remove('hidden');
    renderFinal();
  }
  if (state.finalMatch?.status === 'completed') {
    showChampion(state.finalMatch.winner);
  }
  updateStats();
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
load();
restoreUI();
</script>
</body>
</html>
